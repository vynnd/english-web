server.port=8080
spring.application.name=english-web-backend

# Database
spring.datasource.url=jdbc:postgresql://localhost:5434/english_web
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
jwt.secret=c2VjcmV0a2V5Zm9yZW5nbGlzaHdlYmFwcGxpY2F0aW9uMTIzNDU2Nzg5MA==
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# CORS
app.cors.allowed-origins=http://localhost:5173

# Anthropic (actual key lives in application-local.properties — never committed)
anthropic.api.key=${ANTHROPIC_API_KEY}
anthropic.model=claude-haiku-4-5-20251001
spring.config.import=optional:classpath:application-local.properties
